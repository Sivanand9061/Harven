<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - HARVEN</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f3f4f1 0%, #e8f3e8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-size: 28px;
            color: var(--green-primary);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .login-header p {
            color: var(--gray-text);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--dark-text);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: "Inter", sans-serif;
            transition: border-color var(--transition-base);
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--green-primary);
            box-shadow: 0 0 0 3px rgba(27, 94, 61, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--green-primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition-base);
            font-family: "Poppins", sans-serif;
        }

        .login-btn:hover {
            background: #134c2c;
        }

        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error-message {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 10px;
            display: none;
            text-align: center;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            margin-bottom: 10px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--green-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--gray-text);
        }

        .login-footer a {
            color: var(--green-primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <h1>HARVEN Admin</h1>
            <p>Enter your credentials to access the dashboard</p>
        </div>

        <div class="loading-spinner" id="loadingSpinner">
            <div class="spinner"></div>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="password">Admin Password</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Enter admin password" 
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="login-btn" id="loginBtn">Login to Dashboard</button>

            <div class="error-message" id="errorMessage"></div>
        </form>

        <div class="login-footer">
            <p>© 2024 HARVEN. All rights reserved.</p>
        </div>
    </div>

    <script>
        // Check if user already logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('adminToken');
            if (token) {
                // User already logged in, redirect to admin dashboard
                window.location.href = 'admin.html';
            }
        });

        async function handleLogin(event) {
            event.preventDefault();

            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMessage');
            const spinner = document.getElementById('loadingSpinner');
            const loginBtn = document.getElementById('loginBtn');

            // Clear previous error
            errorMsg.style.display = 'none';
            errorMsg.textContent = '';

            // Validate input
            if (!password) {
                errorMsg.textContent = 'Please enter a password';
                errorMsg.style.display = 'block';
                return;
            }

            // Show loading state
            spinner.style.display = 'block';
            loginBtn.disabled = true;

            try {
                const response = await fetch('http://localhost:5001/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    // Store token in localStorage
                    localStorage.setItem('adminToken', result.token);
                    
                    // Show success and redirect
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 500);
                } else {
                    errorMsg.textContent = result.message || 'Invalid password. Please try again.';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = 'Connection error. Is the server running on port 5001?';
                errorMsg.style.display = 'block';
            } finally {
                spinner.style.display = 'none';
                loginBtn.disabled = false;
            }
        }

        // Allow Enter key to submit form
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>

</html>
