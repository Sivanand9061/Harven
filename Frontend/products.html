<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - HARVEN</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        /* ===== MOBILE OVERRIDES ===== */
        @media (max-width: 768px) {

            /* Compact page header — no wasted space */
            .page-header {
                padding: 12px 0 8px !important;
            }
            .page-title-large {
                font-size: 20px !important;
                margin: 4px 0 0 !important;
                line-height: 1.2 !important;
            }
            /* Hide the subtitle on mobile — not needed */
            .page-subtitle-large {
                display: none !important;
            }
            .breadcrumb {
                font-size: 12px !important;
                margin-bottom: 4px !important;
            }

            /* Always-visible mobile filter bar */
            .mobile-filter-bar {
                display: flex !important;
                flex-direction: column;
                gap: 10px;
                padding: 10px 16px;
            }
            .mobile-search-row {
                position: relative;
            }
            .mobile-search-row .search-icon {
                position: absolute;
                left: 12px;
                top: 50%;
                transform: translateY(-50%);
                color: #999;
                pointer-events: none;
            }
            .mobile-search-row input {
                width: 100%;
                padding: 10px 12px 10px 38px;
                border: 1.5px solid #e0e0e0;
                border-radius: 50px;
                font-size: 14px;
                background: #f8f8f8;
                box-sizing: border-box;
                outline: none;
            }
            .mobile-search-row input:focus {
                border-color: #c85c2a;
                background: #fff;
            }
            .mobile-pills-row {
                display: flex;
                gap: 8px;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
                padding-bottom: 2px;
            }
            .mobile-pills-row::-webkit-scrollbar { display: none; }
            .mobile-pill {
                flex-shrink: 0;
                padding: 6px 14px;
                border-radius: 50px;
                border: 1.5px solid #e0e0e0;
                background: #fff;
                font-size: 13px;
                font-weight: 500;
                color: #555;
                cursor: pointer;
                white-space: nowrap;
            }
            .mobile-pill.active {
                background: #c85c2a;
                border-color: #c85c2a;
                color: #fff;
            }

            /* Hide desktop filter on mobile */
            .desktop-filter { display: none !important; }
            /* Hide old mobile toggle panel entirely */
            .mobile-filter { display: none !important; }
            /* Hide filter section container padding */
            .products-filter-section .container-new { padding: 0 !important; }

            /* Product grid */
            .products-grid-new {
                display: grid !important;
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 10px !important;
                padding: 10px !important;
            }
            .product-image-new {
                height: auto !important;
                aspect-ratio: 1 / 1 !important;
                background-size: cover;
                background-position: center;
            }
            .product-content-new {
                padding: 10px !important;
                display: flex;
                flex-direction: column;
            }
            .product-title-new {
                font-size: 13px !important;
                line-height: 1.2 !important;
                margin-bottom: 4px !important;
                height: 32px;
                overflow: hidden;
            }
            .product-meta-new {
                flex-direction: column !important;
                gap: 2px !important;
                margin-bottom: 4px !important;
            }
            .meta-item-new {
                font-size: 10px !important;
                padding: 2px 0 !important;
            }
            .meta-item-new svg { width: 10px !important; height: 10px !important; }
            .product-description-new {
                display: -webkit-box !important;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
                font-size: 11px !important;
                line-height: 1.3 !important;
                color: #666;
            }
        }
        /* Hide mobile bar on desktop */
        @media (min-width: 769px) {
            .mobile-filter-bar { display: none !important; }
        }
    </style>

</head>

<body>

    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html">
                    <img src="images/logo.png" alt="HARVEN" class="logo-image">
                </a>
            </div>

            <button class="hamburger" id="hamburger" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="products.html" class="nav-link">Products</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>


            </ul>
        </div>
    </nav>

    <!-- Page Header: compact on mobile -->
    <section class="page-header">
        <div class="container-new">
            <div class="breadcrumb">
                <a href="index.html">Home</a>
                <span class="breadcrumb-separator">/</span>
                <span>Products</span>
            </div>
            <h1 class="page-title-large">Our Products</h1>
            <p class="page-subtitle-large">Premium quality commodities sourced from the world's finest origins.</p>
        </div>
    </section>

    <!-- Mobile: Always-visible search + scrollable filter pills -->
    <div class="mobile-filter-bar">
        <div class="mobile-search-row">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 17A8 8 0 1 0 9 1a8 8 0 0 0 0 16zM18 18l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <input type="text" id="searchInputMobile" placeholder="Search products...">
        </div>
        <div class="mobile-pills-row" id="mobilePillsRow">
            <button class="mobile-pill active" data-category="all">All</button>
            <button class="mobile-pill" data-category="grains">Grains</button>
            <button class="mobile-pill" data-category="produce">Produce</button>
            <button class="mobile-pill" data-category="nuts">Nuts</button>
            <button class="mobile-pill" data-category="spices">Spices</button>
            <button class="mobile-pill" data-category="processed">Processed</button>
            <button class="mobile-pill" data-category="frozen">Frozen</button>
        </div>
    </div>

    <!-- Filter Section -->
    <section class="products-filter-section" id="productsFilter">
        <div class="container-new">
            <!-- Desktop: Always visible -->
            <div class="filter-container desktop-filter">
                <div class="search-wrapper">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 17A8 8 0 1 0 9 1a8 8 0 0 0 0 16zM18 18l-4.35-4.35" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search products..." class="search-input-new">
                </div>

                <div class="filter-pills">
                    <button class="filter-pill active" data-category="all">All</button>
                    <button class="filter-pill" data-category="grains">Grains</button>
                    <button class="filter-pill" data-category="produce">Produce</button>
                    <button class="filter-pill" data-category="nuts">Nuts</button>
                    <button class="filter-pill" data-category="spices">Spices</button>
                    <button class="filter-pill" data-category="processed">Processed</button>
                    <button class="filter-pill" data-category="frozen">Frozen</button>
                </div>
            </div>

            <!-- Mobile: Compact version -->
            <div class="filter-container mobile-filter">
                <button class="mobile-search-toggle" id="mobileSearchToggle">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 17A8 8 0 1 0 9 1a8 8 0 0 0 0 16zM18 18l-4.35-4.35" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <span>Search & Filter</span>
                </button>

                <div class="mobile-filter-panel" id="mobileFilterPanel">
                    <div class="mobile-filter-header">
                        <h3>Search & Filter</h3>
                        <button class="mobile-filter-close" id="mobileFilterClose">&times;</button>
                    </div>

                    <div class="search-wrapper-mobile">
                        <svg class="search-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M9 17A8 8 0 1 0 9 1a8 8 0 0 0 0 16zM18 18l-4.35-4.35" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <input type="text" id="searchInputMobile" placeholder="Search products..."
                            class="search-input-new">
                    </div>

                    <div class="filter-pills-mobile">
                        <button class="filter-pill-mobile active" data-category="all">All Products</button>
                        <button class="filter-pill-mobile" data-category="grains">Grains</button>
                        <button class="filter-pill-mobile" data-category="produce">Fresh Produce</button>
                        <button class="filter-pill-mobile" data-category="nuts">Nuts & Dried Fruits</button>
                        <button class="filter-pill-mobile" data-category="spices">Spices</button>
                        <button class="filter-pill-mobile" data-category="processed">Processed Foods</button>
                        <button class="filter-pill-mobile" data-category="frozen">Frozen Products</button>
                    </div>

                    <button class="mobile-filter-apply" id="mobileFilterApply">Apply Filters</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Products Grid -->
    <section class="products-section">
        <div class="container-new">
            <div class="products-grid-new" id="productsGrid">
                <!-- Products loaded via JS -->
            </div>

            <div class="no-results-new" id="noResults" style="display: none;">
                <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="32" cy="32" r="30" stroke="currentColor" stroke-width="2" opacity="0.2" />
                    <path d="M32 20v24M32 48h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
                </svg>
                <h3>No products found</h3>
                <p>Try adjusting your search or filters</p>
            </div>
        </div>
    </section>


    <!-- Back to Top -->
    <button id="backToTop" class="back-to-top" aria-label="Back to top">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 19V5M5 12L12 5L19 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" />
        </svg>
    </button>

    <script src="config.js"></script>
    <script src="script.js"></script>

    <script type="text/javascript">
        // State
        const urlParamsProducts = new URLSearchParams(window.location.search);
        let currentCategory = urlParamsProducts.get('category') || 'all';
        let searchTerm = '';
        let productsData = []; // Will be populated from API

        // Highlight correct filter pill initially
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.filter-pill').forEach(btn => {
                if(btn.dataset.category === currentCategory) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            document.querySelectorAll('.filter-pill-mobile').forEach(btn => {
                if(btn.dataset.category === currentCategory) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        });

        // DOM Elements
        const productsGrid = document.getElementById('productsGrid');
        const searchInput = document.getElementById('searchInput');
        const filterButtons = document.querySelectorAll('.filter-pill');
        const noResults = document.getElementById('noResults');

        // Fetch products from API
        async function fetchProducts() {
            try {
                const response = await fetch(API_CONFIG.baseUrl + API_CONFIG.endpoints.products);
                const result = await response.json();
                
                if (result.success && Array.isArray(result.data)) {
                    // Map MongoDB _id to id for compatibility with existing code
                    productsData = result.data.map(product => ({
                        ...product,
                        id: product._id
                    }));
                    filterProducts();
                } else {
                    console.error('Failed to load products:', result.message);
                    productsGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #999;">Error loading products. Please refresh the page.</div>';
                }
            } catch (error) {
                console.error('Error fetching products:', error);
                productsGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #999;">Unable to load products. Check your connection.</div>';
            }
        }

        function renderProducts(products) {
            if (products.length === 0) {
                productsGrid.innerHTML = '';
                noResults.style.display = 'flex';
                return;
            }

            noResults.style.display = 'none';

            productsGrid.innerHTML = products.map(product => {
                return `
    <a class="product-card-new" href="product-detail.html?id=${product.id}" style="cursor: pointer; text-decoration: none; display: block; color: inherit;">
        <div class="product-image-new" style="background-image: url('${product.image}');">
            <span class="product-category-badge">${product.category}</span>
        </div>
        <div class="product-content-new">
            <h3 class="product-title-new">${product.name}</h3>
            <div class="product-meta-new">
                <span class="meta-item-new">
                    <svg width="12" height="12" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M7 1.75v10.5M1.75 7h10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    ${product.origin}
                </span>
                <span class="meta-item-new">
                    <svg width="12" height="12" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="2" y="3" width="10" height="8" rx="1" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M9 1v4M5 1v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    MOQ: ${product.moq}
                </span>
            </div>
            <p class="product-description-new">${product.description}</p>
            
        </div>
    </a>
`;
            }).join('');
        }

        // Filter Products
        function filterProducts() {
            let filtered = productsData;

            if (currentCategory !== 'all') {
                filtered = filtered.filter(p => p.category === currentCategory);
            }

            if (searchTerm) {
                filtered = filtered.filter(p =>
                    p.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    p.description.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    p.origin.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }

            renderProducts(filtered);
        }

        // Event Listeners
        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                filterProducts();
            });
        });

        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                filterProducts();
            });
        }

        // Request Quote
        async function requestQuote(productName) {
            const confirmRequest = confirm(`Would you like to send a formal quote request for ${productName}?`);

            if (confirmRequest) {
                const testLead = {
                    firstName: "Product",
                    lastName: "Inquiry",
                    email: "pending@harven.com",
                    subject: "quote",
                    message: `Automated interest in: ${productName}. Please follow up with pricing.`
                };

                try {
                    const response = await fetch(API_CONFIG.baseUrl + '/leads', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(testLead)
                    });

                    if (response.ok) {
                        alert(`Inquiry for ${productName} sent! Check your Admin Dashboard.`);
                    }
                } catch (error) {
                    console.error("Error sending quote:", error);
                }
            }
        }

        // Initial Render - Fetch products from API
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', fetchProducts);
        } else {
            fetchProducts();
        }

        // Mobile Filter Panel Logic
        const mobileSearchToggle = document.getElementById('mobileSearchToggle');
        const mobileFilterPanel = document.getElementById('mobileFilterPanel');
        const mobileFilterClose = document.getElementById('mobileFilterClose');
        const mobileFilterApply = document.getElementById('mobileFilterApply');
        const searchInputMobile = document.getElementById('searchInputMobile');
        const filterPillsMobile = document.querySelectorAll('.filter-pill-mobile');

        // Old toggle panel (desktop fallback — no-ops on mobile now)
        if (mobileSearchToggle) {
            mobileSearchToggle.addEventListener('click', () => {
                mobileFilterPanel && mobileFilterPanel.classList.add('active');
            });
        }
        if (mobileFilterClose) {
            mobileFilterClose.addEventListener('click', () => {
                mobileFilterPanel && mobileFilterPanel.classList.remove('active');
                document.body.style.overflow = 'auto';
            });
        }
        if (mobileFilterApply) {
            mobileFilterApply.addEventListener('click', () => {
                mobileFilterPanel && mobileFilterPanel.classList.remove('active');
                document.body.style.overflow = 'auto';
            });
        }

        // ---- NEW: Always-visible mobile search ----
        if (searchInputMobile) {
            searchInputMobile.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                // Sync with desktop search input too
                if (searchInput) searchInput.value = searchTerm;
                filterProducts();
            });
        }

        // ---- NEW: Mobile scrollable pills ----
        const mobilePills = document.querySelectorAll('.mobile-pill');
        mobilePills.forEach(btn => {
            btn.addEventListener('click', () => {
                mobilePills.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                // Sync with desktop pills
                filterButtons.forEach(b => {
                    b.classList.toggle('active', b.dataset.category === currentCategory);
                });
                filterProducts();
            });
        });

        // Old mobile filter pills (hidden but keep logic intact)
        filterPillsMobile.forEach(btn => {
            btn.addEventListener('click', () => {
                filterPillsMobile.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                filterButtons.forEach(b => {
                    b.classList.toggle('active', b.dataset.category === currentCategory);
                });
                filterProducts();
            });
        });
    </script>
</body>

</html>
